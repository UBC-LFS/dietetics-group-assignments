name: Build python script into binary file

on: 
  workflow_dispatch:
    inputs:
      version:
        description: "Enter the version (e.g., v1.0.0)"
        required: true

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install Homebrew and build tools (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install wget xz
    
    - name: Download prebuilt Tcl/Tk 9.0
      run: |
        if [[ "$RUNNER_OS" == "macOS" ]]; then
          wget https://downloads.sourceforge.net/tcl/tcl9.0.0-macos.tar.gz
          tar xzf tcl9.0.0-macos.tar.gz
          echo "TCL_LIBRARY=$PWD/tcl9.0.0-macos/lib/tcl9.0" >> $GITHUB_ENV
          echo "TK_LIBRARY=$PWD/tcl9.0.0-macos/lib/tk9.0" >> $GITHUB_ENV
        elif [[ "$RUNNER_OS" == "Windows" ]]; then
          wget https://prdownloads.sourceforge.net/tcl/tcl9.0.0-win.zip
          unzip tcl9.0.0-win.zip -d tcltk_build
          echo "TCL_LIBRARY=$PWD/tcltk_build/tcl9.0" >> $GITHUB_ENV
          echo "TK_LIBRARY=$PWD/tcltk_build/tk9.0" >> $GITHUB_ENV
        fi
        
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.13.8

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Clean old build files
      shell: bash
      run: rm -rf build dist *.spec

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile \
          --name ProjectMatching \
          --add-binary "$TCL_LIBRARY/*;tcl" \
          --add-binary "$TK_LIBRARY/*;tk" \
          main.py

    - name: Prepare distribution files
      run: |
        if [[ "$RUNNER_OS" == "Windows" ]]; then
          mv dist/ProjectMatching.exe dist/ProjectMatching-windows.exe
          cp README.txt dist/README.txt
        elif [[ "$RUNNER_OS" == "macOS" ]]; then
          mv dist/ProjectMatching dist/ProjectMatching-macos
          cp README.txt dist/README.txt
        fi
      shell: bash

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ProjectMatching-${{ matrix.os }}
        path: dist/*

  release:
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List downloaded files (Debugging)
        run: ls -R

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          files: |
            ProjectMatching-macos
            ProjectMatching-windows.exe
