name: Build python script into binary file

on: 
  workflow_dispatch:
    inputs:
      version:
        description: "Enter the version (e.g., v1.0.0)"
        required: true

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Download prebuilt Tcl/Tk 9.0
      run: |
        curl -L -o tcl9.0.2-src.tar.gz https://sourceforge.net/projects/tcl/files/Tcl/9.0.2/tcl9.0.2-src.tar.gz
        tar xzf tcl9.0.2-src.tar.gz
        curl -L -o tk9.0.2-src.tar.gz https://sourceforge.net/projects/tcl/files/Tcl/9.0.2/tk9.0.2-src.tar.gz
        tar xzf tk9.0.2-src.tar.gz

        if [[ "$RUNNER_OS" == "macOS" ]]; then    
          cd tcl9.0.2/unix
          ./configure --prefix=/usr/local
          make
          sudo make install
          cd ../..
          
          cd tk9.0.2/unix
          ./configure --prefix=/usr/local --with-tcl=/usr/local/lib
          make
          sudo make install
          cd ../..
        
        elif [[ "$RUNNER_OS" == "Windows" ]]; then
          cd tcl9.0.2/win
          nmake -f makefile.vc release
          nmake -f makefile.vc install INSTALLDIR=C:/tcltk
          cd ../..
          
          cd tk9.0.2/win
          nmake -f makefile.vc release TCLDIR=../../tcl9.0.2
          nmake -f makefile.vc install INSTALLDIR=C:/tcltk TCLDIR=../../tcl9.0.2
          cd ../..
          
          echo "C:/tcltk/bin" >> $GITHUB_PATH
        fi
      shell: bash

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.13.8

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Clean old build files
      shell: bash
      run: rm -rf build dist *.spec

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile \
          --name ProjectMatching \
          --add-binary "$TCL_LIBRARY/*;tcl" \
          --add-binary "$TK_LIBRARY/*;tk" \
          main.py

    - name: Prepare distribution files
      run: |
        if [[ "$RUNNER_OS" == "Windows" ]]; then
          mv dist/ProjectMatching.exe dist/ProjectMatching-windows.exe
          cp README.txt dist/README.txt
        elif [[ "$RUNNER_OS" == "macOS" ]]; then
          mv dist/ProjectMatching dist/ProjectMatching-macos
          cp README.txt dist/README.txt
        fi
      shell: bash

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ProjectMatching-${{ matrix.os }}
        path: dist/*

  release:
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List downloaded files (Debugging)
        run: ls -R

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          files: |
            ProjectMatching-macos
            ProjectMatching-windows.exe
