name: Build python script into binary file

on: 
  push:
    branches: [improve-preferences]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with: 
        python-version: '3.x'
    
    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name ProjectMatching main.py

    - name: Rename executable
      run: |
        if [[ "$RUNNER_OS" == "Windows" ]]; then
          mv dist/ProjectMatching.exe dist/ProjectMatching-windows.exe
        elif [[ "$RUNNER_OS" == "Linux" ]]; then
            mv dist/ProjectMatching dist/ProjectMatching-linux
        elif [[ "$RUNNER_OS" == "macOS" ]]; then
            mv dist/ProjectMatching dist/ProjectMatching-macos
        fi
      shell: bash
    
    - name: Copy README to dist
      run: |
        cp README.txt dist/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ProjectMatching-${{ matrix.os }}
        path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List downloaded files (Debugging)
        run: ls -R

      - name: Make files executable (Linux/Mac)
        run: chmod +x ProjectMatching-* || true

      - name: Package releases
        run: |
          cd dist
          zip ProjectMatching-linux.zip ProjectMatching-linux README.txt
          zip ProjectMatching-macos.zip ProjectMatching-macos README.txt
          zip ProjectMatching-windows.zip ProjectMatching-windows.exe README.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          files: |
            dist/ProjectMatching-linux.zip
            dist/ProjectMatching-macos.zip
            dist/ProjectMatching-windows.zip

 




      
        
