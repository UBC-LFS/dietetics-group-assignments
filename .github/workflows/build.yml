name: Build python script into binary file

on: 
  workflow_dispatch:
    inputs:
      version:
        description: "Enter the version (e.g., v1.0.0)"
        required: true

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        python-version: 3.13.8
        channels: conda-forge
        activate-environment: tcltk_env
        environment-file: environment.yml
        auto-activate-base: false

    - name: Install dependencies
      run: |
        conda activate tcltk_env
        pip install -r requirements.txt

    - name: Clean old build files
      shell: bash
      run: rm -rf build dist *.spec

    - name: Build with PyInstaller
      run: |
        conda activate tcltk_env
        pyinstaller --onefile --name ProjectMatching main.py

    - name: Prepare distribution files
      run: |
        if [[ "$RUNNER_OS" == "Windows" ]]; then
          mv dist/ProjectMatching.exe dist/ProjectMatching-windows.exe
          cp README.txt dist/README.txt
        elif [[ "$RUNNER_OS" == "macOS" ]]; then
          mv dist/ProjectMatching dist/ProjectMatching-macos
          cp README.txt dist/README.txt
        fi
      shell: bash

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ProjectMatching-${{ matrix.os }}
        path: dist/*

  release:
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List downloaded files (Debugging)
        run: ls -R

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          files: |
            ProjectMatching-macos
            ProjectMatching-windows.exe
